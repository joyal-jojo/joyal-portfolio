<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Details — Joyal Jojo</title>
  <meta name="description" content="Detailed project view." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    /* Specific styles for the project page layout */
    .project-page-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 10;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-cyan);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 14px;
      margin-bottom: 32px;
      transition: transform 0.3s var(--ease-smooth);
    }
    .back-btn:hover {
      transform: translateX(-5px);
      text-shadow: 0 0 12px rgba(0, 245, 255, 0.5);
    }
    .project-hero {
      position: relative;
      width: 100%;
      height: 400px;
      border-radius: var(--card-radius);
      overflow: hidden;
      margin-bottom: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
    }
    .project-hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .project-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px;
    }
    .project-page-category {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      font-size: 12px;
      font-family: var(--font-mono);
      color: #fff;
      margin-bottom: 16px;
      align-self: flex-start;
    }
    .project-page-title {
      font-size: 48px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .project-page-subtitle {
      font-size: 20px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .project-content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 40px;
    }
    @media (max-width: 900px) {
      .project-content-grid {
        grid-template-columns: 1fr;
      }
    }
    .project-section-title {
      font-size: 14px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 8px;
    }
    .project-page-desc {
      font-size: 18px;
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }
    .project-page-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }
    .project-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .project-gallery-img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: var(--card-radius-sm);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: transform 0.3s;
    }
    .project-gallery-img:hover {
      transform: scale(1.05);
      border-color: var(--accent-cyan);
    }
    .project-sidebar-box {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 32px;
      backdrop-filter: blur(12px);
    }
    .project-file-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius-sm);
      color: var(--text-primary);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 14px;
      margin-bottom: 12px;
      transition: all 0.3s var(--ease-smooth);
    }
    .project-file-btn:hover {
      background: rgba(0, 245, 255, 0.1);
      border-color: var(--accent-cyan);
      transform: translateY(-2px);
    }
    .project-file-btn svg {
      color: var(--accent-cyan);
    }
    body, * {
      cursor: auto !important;
    }
    a, button, .project-gallery-img, .project-file-btn {
      cursor: pointer !important;
    }
  </style>
</head>
<body>
  
  <canvas id="three-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.3;"></canvas>

  <div class="project-page-wrapper">
    <a href="#" onclick="window.close(); return false;" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Close Tab
    </a>

    <div id="project-container">
      <!-- Populated by JS -->
    </div>
  </div>

  <script type="module" src="/src/project.js"></script>
</body>
</html>
